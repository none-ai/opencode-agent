<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - openclaw 🦞</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        .app-container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .sidebar.collapsed {
            transform: translateX(-100%);
            position: absolute;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
        }
        .sidebar-header h2 {
            font-size: 18px;
            color: #58a6ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .new-chat-btn:hover {
            background: #2ea043;
        }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .session-item {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .session-item:hover {
            background: #21262d;
        }
        .session-item.active {
            background: #30363d;
            border: 1px solid #58a6ff;
        }
        .session-preview {
            font-size: 13px;
            color: #8b949e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .session-delete {
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            opacity: 0;
            transition: all 0.2s;
        }
        .session-item:hover .session-delete {
            opacity: 1;
        }
        .session-delete:hover {
            background: #da3633;
            color: white;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #161b22;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .toggle-sidebar {
            background: transparent;
            border: none;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #58a6ff;
        }
        .logo span {
            font-size: 24px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .header-btn {
            background: transparent;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .header-btn:hover {
            background: #21262d;
            border-color: #8b949e;
        }
        .header-btn.danger:hover {
            background: #da3633;
            border-color: #da3633;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 20px;
            padding: 16px;
            border-radius: 8px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            background: #1f6feb;
            margin-left: auto;
            border: 1px solid #388bfd;
        }
        .message.assistant {
            background: #161b22;
            border: 1px solid #30363d;
        }
        .message.typing {
            background: #161b22;
            border: 1px solid #30363d;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #58a6ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .message-label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #8b949e;
        }
        .message.user .message-label {
            color: rgba(255,255,255,0.8);
        }
        .message-content {
            line-height: 1.6;
            word-wrap: break-word;
        }
        .message-content code {
            background: rgba(110,118,129,0.4);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 0.9em;
        }
        .message-content pre {
            background: #0d1117;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .message-content pre code {
            background: transparent;
            padding: 0;
        }
        .message-content p {
            margin-bottom: 12px;
        }
        .message-content p:last-child {
            margin-bottom: 0;
        }
        .message-content ul, .message-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .message-content li {
            margin-bottom: 5px;
        }
        .message-content a {
            color: #58a6ff;
        }
        .message-content blockquote {
            border-left: 3px solid #30363d;
            padding-left: 12px;
            margin: 10px 0;
            color: #8b949e;
        }
        .input-area {
            padding: 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
        }
        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        #message-input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #30363d;
            border-radius: 8px;
            font-size: 15px;
            background: #0d1117;
            color: #c9d1d9;
            outline: none;
            resize: none;
            min-height: 50px;
            max-height: 200px;
            font-family: inherit;
        }
        #message-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
        }
        #message-input::placeholder {
            color: #6e7681;
        }
        #send-btn {
            background: #238636;
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        #send-btn:hover {
            background: #2ea043;
        }
        #send-btn:disabled {
            background: #21262d;
            color: #6e7681;
            cursor: not-allowed;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6e7681;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #c9d1d9;
        }
        .api-warning {
            background: #1f6feb;
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
        }
        .api-warning a {
            color: #fff;
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                z-index: 100;
                height: 100%;
            }
            .sidebar.collapsed {
                transform: translateX(-100%);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><span>🦞</span> openclaw</h2>
                <button class="new-chat-btn" onclick="createNewSession()">+ New Chat</button>
            </div>
            <div class="sessions-list" id="sessions-list">
                <!-- Sessions will be loaded here -->
            </div>
        </aside>

        <main class="main-content">
            <div id="api-warning" class="api-warning" style="display: none;">
                ⚠️ API key not configured. <a href="#" onclick="alert('Please add your Anthropic API key to config.yaml or set ANTHROPIC_API_KEY environment variable')">Learn more</a>
            </div>
            <header class="chat-header">
                <div class="header-left">
                    <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
                    <div class="logo"><span>🦞</span> openclaw</div>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="clearCurrentChat()">Clear Chat</button>
                </div>
            </header>

            <div class="chat-container" id="chat-container">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h3>Start a conversation</h3>
                    <p>Send a message to begin chatting with AI</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const emptyState = document.getElementById('empty-state');
        const sessionsList = document.getElementById('sessions-list');
        const apiWarning = document.getElementById('api-warning');

        let currentSessionId = null;
        let isStreaming = false;

        // Initialize
        async function init() {
            await checkApiKey();
            await loadSessions();
            await loadHistory();
        }

        async function checkApiKey() {
            try {
                const response = await fetch('/api/settings');
                const data = await response.json();
                if (!data.api_key_configured) {
                    apiWarning.style.display = 'block';
                }
            } catch (error) {
                console.error('Error checking API key:', error);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions');
                const data = await response.json();
                renderSessions(data.sessions);
            } catch (error) {
                console.error('Error loading sessions:', error);
            }
        }

        function renderSessions(sessions) {
            sessionsList.innerHTML = '';
            sessions.forEach(session => {
                const div = document.createElement('div');
                div.className = `session-item ${session.id === currentSessionId ? 'active' : ''}`;
                div.onclick = (e) => {
                    if (!e.target.classList.contains('session-delete')) {
                        switchSession(session.id);
                    }
                };
                div.innerHTML = `
                    <span class="session-preview">${session.preview || 'Empty chat'}</span>
                    <button class="session-delete" onclick="deleteSession('${session.id}')" title="Delete">✕</button>
                `;
                sessionsList.appendChild(div);
            });
        }

        async function switchSession(sessionId) {
            try {
                const response = await fetch(`/api/sessions/${sessionId}`, { method: 'PUT' });
                const data = await response.json();
                currentSessionId = data.session_id;
                renderHistory(data.history);
                loadSessions();
            } catch (error) {
                console.error('Error switching session:', error);
            }
        }

        async function createNewSession() {
            try {
                const response = await fetch('/api/sessions', { method: 'POST' });
                const data = await response.json();
                currentSessionId = data.session_id;
                chatContainer.innerHTML = '';
                chatContainer.appendChild(emptyState);
                emptyState.style.display = 'flex';
                loadSessions();
            } catch (error) {
                console.error('Error creating session:', error);
            }
        }

        async function deleteSession(sessionId) {
            event.stopPropagation();
            try {
                await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
                if (currentSessionId === sessionId) {
                    await createNewSession();
                }
                loadSessions();
            } catch (error) {
                console.error('Error deleting session:', error);
            }
        }

        async function clearCurrentChat() {
            if (!confirm('Are you sure you want to clear this chat?')) return;
            try {
                await fetch('/api/history', { method: 'DELETE' });
                chatContainer.innerHTML = '';
                chatContainer.appendChild(emptyState);
                emptyState.style.display = 'flex';
                loadSessions();
            } catch (error) {
                console.error('Error clearing chat:', error);
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                currentSessionId = data.session_id;
                renderHistory(data.history);
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        function renderHistory(history) {
            chatContainer.innerHTML = '';
            if (history.length === 0) {
                chatContainer.appendChild(emptyState);
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';
            history.forEach(msg => {
                addMessage(msg.content, msg.role, false);
            });
        }

        function addMessage(content, role, isNew = true) {
            if (isNew && emptyState.style.display !== 'none') {
                emptyState.style.display = 'none';
            }

            const div = document.createElement('div');
            div.className = `message ${role}`;

            const label = role === 'user' ? 'You' : 'Assistant';
            const renderedContent = renderMarkdown(content);

            div.innerHTML = `
                <div class="message-label">${label}</div>
                <div class="message-content">${renderedContent}</div>
            `;

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Highlight code blocks
            div.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });
        }

        function renderMarkdown(text) {
            // Simple markdown rendering
            let html = text;

            // Code blocks
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>');

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Line breaks to paragraphs
            html = html.split('\n\n').map(p => {
                if (p.startsWith('<') || p.trim() === '') return p;
                return `<p>${p.replace(/\n/g, '<br>')}</p>`;
            }).join('');

            return html;
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message assistant typing';
            div.id = 'typing-indicator';
            div.innerHTML = `
                <div class="message-label">Assistant</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            addMessage(message, 'user', true);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            showTypingIndicator();
            isStreaming = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        session_id: currentSessionId,
                        stream: true
                    })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    const error = await response.json();
                    addMessage(`Error: ${error.error || 'Unknown error'}`, 'assistant', true);
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessage = '';
                let messageDiv = null;

                // Create message container for streaming
                const labelDiv = document.createElement('div');
                labelDiv.className = 'message-label';
                labelDiv.textContent = 'Assistant';

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                messageDiv = document.createElement('div');
                messageDiv.className = 'message assistant';
                messageDiv.appendChild(labelDiv);
                messageDiv.appendChild(contentDiv);
                chatContainer.appendChild(messageDiv);

                if (emptyState.style.display !== 'none') {
                    emptyState.style.display = 'none';
                }

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.text) {
                                    assistantMessage += data.text;
                                    contentDiv.innerHTML = renderMarkdown(assistantMessage);
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                }
                            } catch (e) {
                                // Skip invalid JSON
                            }
                        }
                    }
                }

                // Highlight any new code blocks
                messageDiv.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });

                currentSessionId = (await (await fetch('/api/history')).json()).session_id;
                loadSessions();

            } catch (error) {
                removeTypingIndicator();
                addMessage('Error sending message: ' + error.message, 'assistant', true);
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
            }
        }

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Send on Enter (Shift+Enter for new line)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize app
        init();
    </script>
</body>
</html>
