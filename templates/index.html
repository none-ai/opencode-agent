<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>openclaw - Your Personal AI Assistant 🦞</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .tagline {
            font-size: 1.2em;
            color: #aaa;
            margin-bottom: 40px;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
        }
        .btn {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2em;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="logo">🦞</div>
    <h1>openclaw</h1>
    <p class="tagline">Your own personal AI assistant. Any OS. Any Platform. The lobster way.</p>

    <div class="features">
        <div class="feature">
            <h3>Cross-Platform</h3>
            <p>Works on any operating system</p>
        </div>
        <div class="feature">
            <h3>Easy to Use</h3>
            <p>Simple and intuitive interface</p>
        </div>
        <div class="feature">
            <h3>Open Source</h3>
            <p>Free and customizable</p>
        </div>
    </div>

    <a href="/chat" class="btn">Start Chatting</a>
</body>
</html>
